<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AfriQ ArtisanSkills | Preview</title>
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; }
      body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; background: #0f1519; color: rgba(255, 255, 255, 0.92); }
      .wrap { min-height: 100%; box-sizing: border-box; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
      .top { display: flex; flex-wrap: wrap; align-items: baseline; justify-content: space-between; gap: 10px; }
      .title { font-weight: 900; letter-spacing: -0.01em; }
      .hint { color: rgba(255, 255, 255, 0.62); font-size: 13px; }
      .grid { flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr; gap: 12px; }
      .panel { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 14px; overflow: hidden; min-height: 0; }
      .panelHead { padding: 10px 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.10); display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 8px; }
      .panelHead strong { font-size: 13px; }
      .links { display: flex; flex-wrap: wrap; gap: 10px; }
      .links a { color: #84cc16; text-decoration: none; font-weight: 800; font-size: 13px; }
      .links a:hover { text-decoration: underline; }
      .list { padding: 10px 12px; display: grid; gap: 10px; }
      .listGroup { display: grid; gap: 8px; }
      .listGroupTitle { font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em; color: rgba(255, 255, 255, 0.62); }
      .listItems { display: flex; flex-wrap: wrap; gap: 10px; }
      .listItems a { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.12); padding: 8px 10px; border-radius: 999px; color: rgba(255, 255, 255, 0.92); text-decoration: none; font-weight: 800; font-size: 13px; }
      .listItems a:hover { border-color: rgba(255, 255, 255, 0.22); }
      iframe { width: 100%; height: 100%; border: 0; background: #fff; }
      @media (min-width: 1024px) {
        .grid { grid-template-columns: 1fr 2fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <div class="title">AfriQ ArtisanSkills – Preview</div>
          <div class="hint">Add ?nocache=1 to this page to pass it through to links and embeds.</div>
        </div>
        <div class="links">
          <a id="openHome" href="index_new.html" target="_blank" rel="noopener">Open Home</a>
          <a id="openCareers" href="careers/" target="_blank" rel="noopener">Open Careers</a>
        </div>
      </div>
      <div class="grid">
        <section class="panel">
          <div class="panelHead">
            <strong>Key Pages</strong>
          </div>
          <div class="list">
            <div class="listGroup">
              <div class="listGroupTitle">Primary</div>
              <div class="listItems">
                <a data-preview-link href="index_new.html">Home (index_new.html)</a>
                <a data-preview-link href="careers/">Careers</a>
                <a data-preview-link href="solutions.html">Solutions</a>
                <a data-preview-link href="resources.html">Resources</a>
                <a data-preview-link href="catalog.html">Catalog</a>
                <a data-preview-link href="see-it-in-action.html">See It In Action</a>
                <a data-preview-link href="community.html">Community</a>
                <a data-preview-link href="about.html">About</a>
                <a data-preview-link href="contact.html">Contact</a>
              </div>
            </div>
            <div class="listGroup">
              <div class="listGroupTitle">Other</div>
              <div class="listItems">
                <a data-preview-link href="index.html">index.html</a>
              </div>
            </div>
          </div>
        </section>
        <section class="panel">
          <div class="panelHead">
            <strong>Live Embed</strong>
            <div class="links">
              <a id="embedHome" href="#">Home</a>
              <a id="embedCareers" href="#">Careers</a>
              <a id="embedSolutions" href="#">Solutions</a>
              <a id="embedResources" href="#">Resources</a>
            </div>
          </div>
          <iframe id="frame" title="Preview Frame"></iframe>
        </section>
      </div>
    </div>
    <script>
      (function () {
        var params = new URLSearchParams(location.search || "");
        var nocache = params.get("nocache");
        var q = nocache ? ("?nocache=" + encodeURIComponent(nocache)) : "";

        function withCache(url) {
          if (!q) return url;
          if (url.indexOf("?") !== -1) return url + "&nocache=" + encodeURIComponent(nocache);
          return url + q;
        }

        var linkEls = document.querySelectorAll("[data-preview-link]");
        for (var i = 0; i < linkEls.length; i++) {
          var a = linkEls[i];
          a.href = withCache(a.getAttribute("href"));
          a.target = "_blank";
          a.rel = "noopener";
        }

        var frame = document.getElementById("frame");
        var routes = {
          home: "index_new.html",
          careers: "careers/",
          solutions: "solutions.html",
          resources: "resources.html"
        };

        function setFrame(routeKey) {
          frame.src = withCache(routes[routeKey]);
        }

        document.getElementById("openHome").href = withCache(routes.home);
        document.getElementById("openCareers").href = withCache(routes.careers);

        document.getElementById("embedHome").onclick = function (e) { e.preventDefault(); setFrame("home"); };
        document.getElementById("embedCareers").onclick = function (e) { e.preventDefault(); setFrame("careers"); };
        document.getElementById("embedSolutions").onclick = function (e) { e.preventDefault(); setFrame("solutions"); };
        document.getElementById("embedResources").onclick = function (e) { e.preventDefault(); setFrame("resources"); };

        setFrame("home");
      })();
    </script>
  </body>
</html>
